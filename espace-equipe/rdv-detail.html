let rdv = null;

const rdvId = new URLSearchParams(window.location.search).get('id');

async function init() {

async function loadRdv() {

}

      <!-- PANNEAU ACTIONS -->
      <div class="action-panel">

        ${rdv.status === 'nouveau' ? `

        <div class="action-section">
          <h3>Contact rapide</h3>
          <a href="tel:${rdv.client_tel}" style="display:flex; align-items:center; gap:0.6rem; padding:0.7rem; background:var(--surface2); margin-bottom:0.6rem; color:var(--text); font-size:0.85rem;">
            📞 ${rdv.client_tel}

// ACTIONS
function toggleMulti() {
  const p = document.getElementById('multiPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  // Pré-cocher le commercial connecté
  if (currentProfile) {
    const myName = currentProfile.prenom + ' ' + currentProfile.nom;
    document.querySelectorAll('.collegue-item input').forEach(cb => {
      if (cb.value === myName) cb.checked = true;
    });
  }
}

async function prendreSolo() {
  const myName = currentProfile ? currentProfile.prenom + ' ' + currentProfile.nom : 'Inconnu';
  await updateRdv({ status: 'pris_en_charge', assigned_to: [myName] });
  showToast('RDV pris en charge !', 'success');
  await loadRdv();
}

async function prendrePlusieurs() {
  const selected = Array.from(document.querySelectorAll('.collegue-item input:checked')).map(cb => cb.value);
  if (selected.length === 0) { showToast('Sélectionnez au moins une personne', 'error'); return; }
  await updateRdv({ status: 'pris_en_charge', assigned_to: selected });
  showToast('RDV assigné à ' + selected.join(', '), 'success');
  await loadRdv();
}

async function refuser() {
  if (!confirm('Confirmer que vous ne prenez pas ce rendez-vous ?')) return;
  await updateRdv({ status: 'archive' });
  showToast('RDV non pris — archivé', '');
  setTimeout(() => window.location.href = 'dashboard.html', 1500);
}

async function libererRdv() {
  await updateRdv({ status: 'nouveau', assigned_to: [] });
  showToast('RDV remis dans les nouvelles demandes');
  await loadRdv();
}

async function confirmerRdv() {
  const date = document.getElementById('confirmedDate')?.value;
  const time = document.getElementById('confirmedTime')?.value;
  if (!date || !time) { showToast('Veuillez renseigner la date et l\'heure', 'error'); return; }
  const myName = currentProfile ? currentProfile.prenom + ' ' + currentProfile.nom : 'Inconnu';
  await updateRdv({
    status: 'en_attente_confirmation',
    confirmed_date: date,
    confirmed_time: time,
    confirmed_by: myName
  });
  showToast('Date enregistrée — en attente de confirmation client', 'success');
  await loadRdv();
}

function pad2(n) {
  return String(n).padStart(2, '0');
}

function buildGoogleCalendarLink(rdvData) {
  if (!rdvData.confirmed_date || !rdvData.confirmed_time) return '';
  const start = new Date(`${rdvData.confirmed_date}T${rdvData.confirmed_time}`);
  const end = new Date(start.getTime() + 60 * 60 * 1000);
  const toUtcStamp = (d) => d.getUTCFullYear() + pad2(d.getUTCMonth() + 1) + pad2(d.getUTCDate())
    + 'T' + pad2(d.getUTCHours()) + pad2(d.getUTCMinutes()) + pad2(d.getUTCSeconds()) + 'Z';
  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: `RDV Top Carrelage — ${rdvData.client_prenom} ${rdvData.client_nom}`,
    dates: `${toUtcStamp(start)}/${toUtcStamp(end)}`,
    details: `Rendez-vous chez Top Carrelage (Top Carrelage), 22 Avenue de l'Europe, 59270 Bailleul.`,
    location: `22 Avenue de l'Europe, 59270 Bailleul`
  });
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

function formatDateConfirmee(rdvData) {
  if (!rdvData.confirmed_date) return '';
  return new Date(`${rdvData.confirmed_date}T00:00:00`).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function formatHeureConfirmee(time) {
  if (!time) return '';
  const [h, m] = time.split(':');
  return `${h}h${m}`;
}

function buildUniversLine(rdvData) {
  if (!rdvData.univers || rdvData.univers.length === 0) return '';
  const labels = rdvData.univers.map(u => u.charAt(0).toUpperCase() + u.slice(1)).join(', ');
  return `🏠 Univers concernés : ${labels}`;
}

async function envoyerEmailsConfirmation(rdvData) {
  const calLink = buildGoogleCalendarLink(rdvData);
  const dateAffichee = formatDateConfirmee(rdvData);
  const heureAffichee = formatHeureConfirmee(rdvData.confirmed_time);
  const universLine = buildUniversLine(rdvData);
  const clientNomComplet = `${rdvData.client_prenom} ${rdvData.client_nom}`;

  await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_email: rdvData.client_email,
    title: 'Votre rendez-vous est confirmé !',
    intro: `Bonjour ${rdvData.client_prenom}, votre rendez-vous chez Top Carrelage est confirmé pour la date suivante :`,
    date: dateAffichee,
    heure: heureAffichee,
    univers_line: universLine,
    google_cal_link: calLink,
    signature: `À très bientôt — L'équipe Top Carrelage

En cas d'imprévu, merci de nous appeler au 03 28 48 08 08. Ceci est un email automatique, merci de ne pas y répondre.`
  });

  const assignedNames = rdvData.assigned_to || [];
  const collaborateurs = EMPLOYEES.filter(e => assignedNames.includes(e.name));
  for (const collab of collaborateurs) {
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_email: collab.email,
      title: `RDV confirmé avec ${clientNomComplet}`,
      intro: `Bonjour ${collab.name.split(' ')[0]}, le rendez-vous avec ${clientNomComplet} est confirmé pour la date suivante :`,
      date: dateAffichee,
      heure: heureAffichee,
      univers_line: universLine,
      google_cal_link: calLink,
      signature: `Pensez à l'ajouter à votre agenda.

En cas d'imprévu, merci d'appeler directement le magasin au 03 28 48 08 08. Ceci est un email automatique, merci de ne pas y répondre.`
    });
  }
}

async function passerConfirme() {
  await updateRdv({ status: 'confirme' });
  await loadRdv();
  showToast('RDV confirmé ! ✓', 'success');

  if (rdv) {
    try {
      await envoyerEmailsConfirmation(rdv);
      showToast('Emails de confirmation envoyés ✓', 'success');
    } catch (err) {
      console.error('Erreur envoi emails de confirmation:', err);
      showToast('RDV confirmé, mais erreur lors de l\'envoi des emails', 'error');
    }
  }
}

async function supprimerDefinitivement(id) {
  if (!confirm('Supprimer définitivement cette demande de rendez-vous ? Cette action est irréversible et effacera toutes les données liées (notes, confirmation, etc.).')) return;

  const { data, error } = await db.from('rdv_requests').delete().eq('id', id).select();

  if (error) {
    showToast('Erreur lors de la suppression', 'error');
    return;
  }

  if (!data || data.length === 0) {
    showToast('Suppression refusée par la base de données (permissions). Voir la console pour plus de détails.', 'error');
    console.warn('Suppression bloquée probablement par une policy RLS Supabase manquante pour DELETE sur rdv_requests. id=', id);
    return;
  }

  showToast('Demande supprimée');
  setTimeout(() => window.location.href = 'dashboard.html', 1200);
}

async function archiver() {
  if (!confirm('Archiver ce rendez-vous ?')) return;
  await updateRdv({ status: 'archive' });
  showToast('RDV archivé');
  setTimeout(() => window.location.href = 'dashboard.html', 1500);
}

async function restaurer() {
  await updateRdv({ status: 'confirme' });
  showToast('RDV restauré');
  await loadRdv();
}

async function saveNotes() {
  const notes = document.getElementById('notesInput').value;
  await updateRdv({ notes_internes: notes });
  showToast('Note enregistrée', 'success');
}

async function updateRdv(updates) {
  const { error } = await db
    .from('rdv_requests')
    .update(updates)
    .eq('id', rdvId);
  if (error) showToast('Erreur: ' + error.message, 'error');
}

// Toast
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Déconnexion
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await db.auth.signOut();
  window.location.href = 'index.html';
});

init();
</script>
